name: release-agentbox-binary

# Builds the opencode linux binary and publishes a semver GitHub release.
# The agentbox entrypoint downloads the binary at container startup time
# (using OPENCODE_VERSION env var), so no infra image rebuild is needed.
#
# To deploy a new opencode version to agentboxes:
#   1. Bump version in packages/opencode/package.json, push to main.
#   2. This workflow builds the binary and creates a vX.Y.Z release.
#   3. Set OPENCODE_VERSION=X.Y.Z in Komodo's agents stack environment.
#   4. New agentbox containers pick it up automatically on next spawn.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --ignore-scripts
        working-directory: .

      - name: Get version
        id: version
        run: echo "version=$(jq -r .version packages/opencode/package.json)" >> $GITHUB_OUTPUT

      - name: Build linux x64 binary
        working-directory: packages/opencode
        env:
          OPENCODE_CHANNEL: latest
          OPENCODE_VERSION: ${{ steps.version.outputs.version }}
        run: bun run build --single

      - name: Prepare binary artifact
        run: |
          cp packages/opencode/dist/opencode-linux-x64/bin/opencode opencode-linux-x64
          chmod +x opencode-linux-x64

      - name: Create or update versioned semver release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            gh release upload "v${VERSION}" opencode-linux-x64 --clobber
          else
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --notes "Agentbox fork of opencode v${VERSION} (built from \`main\` at ${{ github.sha }})." \
              opencode-linux-x64
          fi
          echo "Published v${VERSION}"
          echo "To deploy: set OPENCODE_VERSION=${VERSION} in Komodo agents stack environment."